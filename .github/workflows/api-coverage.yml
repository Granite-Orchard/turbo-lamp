name: api-coverage

on:
  pull_request:
    branches: [master]
    paths:
      - "apps/api/**"

concurrency:
  group: api-coverage-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          check-latest: true

      - name: Cache npm store
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('apps/api/package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: apps/api/node_modules/.cache
          key: build-${{ runner.os }}-${{ hashFiles('apps/api/package-lock.json') }}
          restore-keys: build-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Run tests with coverage
        run: npm run test:unit:cov -- --coverageReporters=text --coverageReporters=lcov --coverageReporters=json-summary
        env:
          CI: true

      - name: Enforce 80% coverage threshold
        run: |
          node <<'EOF'
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
          const total = data.total;
          const metrics = ['lines', 'statements', 'functions', 'branches'];
          let failed = false;
          for (const m of metrics) {
            const pct = total[m].pct;
            const pass = pct >= 80;
            console.log(`${pass ? '✅' : '❌'} ${m}: ${pct}%`);
            if (!pass) failed = true;
          }
          if (failed) {
            console.error('\nCoverage below 80% threshold. Please add tests.');
            process.exit(1);
          }
          EOF

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-coverage
          path: apps/api/coverage/
          retention-days: 7

  report:
    name: PR Coverage Comment
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: api-coverage
          path: coverage
        continue-on-error: true

      - name: Build comment
        id: build-comment
        run: |
          node <<'EOF'
          const fs = require('fs');

          const summaryFile = 'coverage/coverage-summary.json';
          if (!fs.existsSync(summaryFile)) {
            const body = '### ❌ Coverage Report\n\nTests failed before coverage was collected.';
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `body<<__EOF__\n${body}\n__EOF__\n`);
            process.exit(0);
          }

          const data = JSON.parse(fs.readFileSync(summaryFile, 'utf8'));
          const total = data.total;
          const fmt = v => Number(v).toFixed(2);
          const ok = v => v >= 80 ? '✅' : '❌';
          const allPass = ['lines','statements','functions','branches'].every(m => total[m].pct >= 80);
          const banner = allPass ? '✅ All metrics >= 80%' : '❌ One or more metrics below 80%';

          const rows = Object.entries(data)
            .filter(([k]) => k !== 'total')
            .map(([file, c]) => ({
              file: file.replace(/^.*?apps\/api\//, ''),
              uncovered: c.lines.total - c.lines.covered,
              lines: c.lines.pct,
              stmts: c.statements.pct,
              funcs: c.functions.pct,
              branches: c.branches.pct,
            }))
            .sort((a, b) => b.uncovered - a.uncovered)
            .slice(0, 10)
            .map(r => `| \`${r.file}\` | ${ok(r.lines)} ${fmt(r.lines)}% | ${ok(r.stmts)} ${fmt(r.stmts)}% | ${ok(r.funcs)} ${fmt(r.funcs)}% | ${ok(r.branches)} ${fmt(r.branches)}% |`)
            .join('\n');

          const body = [
            `### Coverage Report — ${banner}`,
            '',
            '| Metric | Coverage | Status |',
            '|--------|----------|--------|',
            `| Lines      | ${fmt(total.lines.pct)}%      | ${ok(total.lines.pct)}      |`,
            `| Statements | ${fmt(total.statements.pct)}% | ${ok(total.statements.pct)} |`,
            `| Functions  | ${fmt(total.functions.pct)}%  | ${ok(total.functions.pct)}  |`,
            `| Branches   | ${fmt(total.branches.pct)}%   | ${ok(total.branches.pct)}   |`,
            '',
            '<details>',
            '<summary>10 highest-impact uncovered files</summary>',
            '',
            '| File | Lines | Statements | Functions | Branches |',
            '|------|-------|------------|-----------|----------|',
            rows,
            '</details>',
          ].join('\n');

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `body<<__EOF__\n${body}\n__EOF__\n`);
          EOF

      - name: Post PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: api-coverage
          message: ${{ steps.build-comment.outputs.body }}
